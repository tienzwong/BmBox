# Nginx reverse proxy สำหรับ BmBox ERP (เข้าถึงด้วย IP, พอร์ต 80 -> Next.js 3000)
# วางไฟล์นี้ที่ /etc/nginx/sites-available/bmbox.conf แล้ว symlink:
#   sudo ln -s /etc/nginx/sites-available/bmbox.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# ภายหลังถ้ามีโดเมน: ใช้ certbot ออก HTTPS อัตโนมัติ (ดู DEPLOY.md)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # อนุญาตอัปโหลด/ส่งข้อมูลใหญ่ขึ้น
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}
